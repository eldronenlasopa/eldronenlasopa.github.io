<!-- @dsCard group="Brand" viewport="700x300" name="Logo — 3 alternativas" subtitle="Elige el lockup: brackets, monogram (futurista) o terminal" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-inverse)}
  .wrap{padding:28px 30px;display:flex;flex-direction:column;gap:18px}
  .opt{display:flex;align-items:center;gap:20px;padding:18px 22px;border:1px solid var(--border-inverse);border-radius:var(--radius-lg);background:var(--glass-dark);backdrop-filter:blur(8px)}
  .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-cyan);width:96px;flex-shrink:0}
</style></head>
<body>
<div id="root" class="wrap"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Wordmark } = window.ElDronEnLaSopaDesignSystem_5a2264;
  function Demo() {
    return (
      <>
        <div className="opt"><span className="tag">A · brackets</span><Wordmark variant="brackets" size="lg" tone="light" /></div>
        <div className="opt"><span className="tag">B · monogram</span><Wordmark variant="monogram" size="lg" tone="light" /></div>
        <div className="opt"><span className="tag">C · terminal</span><Wordmark variant="terminal" size="lg" tone="light" /></div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

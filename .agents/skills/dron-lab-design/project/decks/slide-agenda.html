<!-- @dsCard group="Slides" viewport="1280x720" name="Agenda" subtitle="Lista numerada de contenidos" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .slide{width:1280px;height:720px;background:radial-gradient(circle at 100% 0%,rgba(255,107,53,.10),transparent 40%),radial-gradient(rgba(11,15,26,.045) 1.2px,transparent 1.2px) 0 0/22px 22px,var(--surface-page);font-family:var(--font-body);padding:88px 96px;box-sizing:border-box}
  .eyebrow{font-family:var(--font-mono);font-size:15px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-orange-600);margin-bottom:14px}
  h2{font-family:var(--font-display);font-weight:700;font-size:52px;letter-spacing:var(--ls-tight);color:var(--text-strong);margin:0 0 56px}
  ol{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:28px 64px}
  li{display:flex;align-items:baseline;gap:20px;border-bottom:1px solid var(--border-subtle);padding-bottom:20px}
  .n{font-family:var(--font-display);font-size:34px;font-weight:700;color:var(--brand-orange);letter-spacing:var(--ls-tight);flex-shrink:0}
  .t{font-size:24px;font-weight:600;color:var(--text-strong)}
</style></head>
<body>
<div class="slide">
  <div class="eyebrow">// Agenda</div>
  <h2>Lo que veremos hoy</h2>
  <ol>
    <li><span class="n">01</span><span class="t">El problema</span></li>
    <li><span class="n">02</span><span class="t">Nuestra propuesta</span></li>
    <li><span class="n">03</span><span class="t">Alcance y entregables</span></li>
    <li><span class="n">04</span><span class="t">Cómo trabajamos</span></li>
    <li><span class="n">05</span><span class="t">Inversión y planes</span></li>
    <li><span class="n">06</span><span class="t">Siguientes pasos</span></li>
  </ol>
</div>
</body></html>

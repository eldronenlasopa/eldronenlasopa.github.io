<!-- @dsCard group="Slides" viewport="1280x720" name="Cita / cierre" subtitle="Testimonio grande y cierre con contacto" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .slide{width:1280px;height:720px;background:var(--surface-card);font-family:var(--font-body);padding:96px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;position:relative}
  .quote-mark{font-family:var(--font-display);font-size:140px;line-height:.6;color:var(--brand-orange);height:70px}
  blockquote{margin:0;font-family:var(--font-display);font-weight:600;font-size:46px;line-height:1.25;letter-spacing:var(--ls-heading);color:var(--text-strong);max-width:960px}
  .who{display:flex;align-items:center;gap:16px;margin-top:40px}
  .av{width:56px;height:56px;border-radius:50%;background:var(--brand-orange);color:var(--text-on-brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--font-display);font-size:20px}
  .name{font-size:18px;font-weight:700;color:var(--text-strong)}
  .role{font-size:15px;color:var(--text-muted);font-family:var(--font-mono)}
  .bar{position:absolute;left:0;top:0;bottom:0;width:12px;background:var(--brand-yellow)}
</style></head>
<body>
<div class="slide">
  <div class="bar"></div>
  <div class="quote-mark">"</div>
  <blockquote>Entendieron nuestro negocio y entregaron a tiempo. Hoy facturamos en minutos lo que antes tomaba horas.</blockquote>
  <div class="who">
    <div class="av">MR</div>
    <div><div class="name">María Rojas</div><div class="role">Gerente de Operaciones · Comercial Andina</div></div>
  </div>
</div>
</body></html>

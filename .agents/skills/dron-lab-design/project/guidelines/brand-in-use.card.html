<!-- @dsCard group="Brand" viewport="700x230" name="Palette in use — futurista" subtitle="Dark-first, glow neón, degradado en titular y grid" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--gradient-ink);padding:26px 28px;position:relative;overflow:hidden}
  .grid{position:absolute;inset:0;background-image:var(--texture-grid);background-size:var(--texture-grid-size);opacity:.5;-webkit-mask-image:radial-gradient(circle at 80% 20%,#000,transparent 72%);mask-image:radial-gradient(circle at 80% 20%,#000,transparent 72%)}
  .glow{position:absolute;top:-100px;right:-60px;width:320px;height:320px;background:radial-gradient(circle,rgba(34,211,238,.22),transparent 68%)}
  .inner{position:relative}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-cyan);margin:0 0 12px;border:1px solid var(--glass-border);background:var(--glass-dark);backdrop-filter:blur(8px);padding:6px 12px;border-radius:var(--radius-pill)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--brand-cyan);box-shadow:0 0 10px var(--brand-cyan)}
  h2{font-family:var(--font-display);font-size:32px;font-weight:700;letter-spacing:var(--ls-tight);margin:0 0 8px;line-height:var(--lh-heading);background:var(--text-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{font-size:15px;color:var(--text-inverse-muted);margin:0 0 18px;max-width:520px;line-height:var(--lh-snug)}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--gradient-signal);color:#0B0F1A;font-weight:700;padding:12px 22px;border-radius:var(--radius-pill);font-size:15px;box-shadow:var(--glow-orange)}
</style></head>
<body>
<div class="grid"></div><div class="glow"></div>
<div class="inner">
  <p class="eyebrow"><span class="dot"></span>Soluciones informáticas</p>
  <h2>Software que hace crecer tu empresa</h2>
  <p>Base midnight, naranja señal para la acción y cian eléctrico como acento HUD. Titulares con degradado, glow neón y textura de grid.</p>
  <span class="btn">Solicitar propuesta →</span>
</div>
</body></html>

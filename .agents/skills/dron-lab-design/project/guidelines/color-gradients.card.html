<!-- @dsCard group="Colors" viewport="700x180" name="Gradients & glow" subtitle="Degradados de marca y glows neón para superficies oscuras" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--ink-950);padding:22px}
  .row{display:flex;gap:16px}
  .cell{flex:1;height:110px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font-size:11px;color:#0B0F1A;font-weight:600}
  .g1{background:var(--gradient-signal)}
  .g2{background:var(--gradient-hud)}
  .g3{background:var(--ink-800);color:var(--brand-orange);box-shadow:var(--glow-orange);justify-content:center;align-items:center}
  .g4{background:var(--ink-800);color:var(--brand-cyan);box-shadow:var(--glow-cyan);justify-content:center;align-items:center}
</style></head>
<body>
<div class="row">
  <div class="cell g1">gradient-signal</div>
  <div class="cell g2">gradient-hud</div>
  <div class="cell g3">glow-orange</div>
  <div class="cell g4">glow-cyan</div>
</div>
</body></html>

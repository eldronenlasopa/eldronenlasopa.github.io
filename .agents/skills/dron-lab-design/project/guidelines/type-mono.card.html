<!-- @dsCard group="Type" viewport="700x160" name="Mono — JetBrains Mono" subtitle="Eyebrows, etiquetas, datos y código" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-card);padding:24px 28px;display:flex;flex-direction:column;gap:14px}
  .eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-orange);font-weight:600}
  .code{font-family:var(--font-mono);font-size:14px;color:var(--text-body);background:var(--surface-sunken);padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-faint)}
</style></head>
<body>
<span class="eyebrow">// Servicios tecnológicos</span>
<code class="code">$ deploy --app dron-sopa --env production</code>
<span class="meta">JetBrains Mono · 400 / 500 / 600 · label 12 uppercase · tracking 0.14em</span>
</body></html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--surface-inverse); font-family: var(--font-body); }

  .grid { position: absolute; inset: 0; background-image: var(--texture-grid); background-size: var(--texture-grid-size); opacity: .4; -webkit-mask-image: radial-gradient(circle at 30% 20%, #000, transparent 72%); mask-image: radial-gradient(circle at 30% 20%, #000, transparent 72%); }

</style>
</head>
<body>
<div id="root"><div class="grid"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Toast, Dialog } = window.ElDronEnLaSopaDesignSystem_5a2264;
  function Demo() {
    return (
      <div className="wrap">
        <div className="col">
          <span className="ey">// Toasts</span>
          <Toast tone="success" title="Propuesta enviada" duration={0}>Te responderemos en menos de 24 horas.</Toast>
          <Toast tone="warning" title="Sesión por expirar" duration={0}>Guarda tus cambios pronto.</Toast>
          <Toast tone="error" title="No se pudo guardar" duration={0}>Revisa tu conexión e inténtalo de nuevo.</Toast>
          <Toast tone="info" title="Nuevo comentario" duration={0}>María dejó una nota en DR-238.</Toast>
        </div>
        <div className="col" style={{flex:'1 1 320px', position:'relative', minHeight: 380}}>

          <div style={{position:'relative', height: 360, borderRadius:'var(--radius-lg)', overflow:'hidden', border:'1px solid var(--glass-border)', transform:'translateZ(0)'}}>
            <Dialog tone="danger" title="¿Eliminar proyecto?"
              confirmLabel="Sí, eliminar" cancelLabel="Cancelar"
              style={{ position:'absolute' }}>
              Esta acción no se puede deshacer. Se borrarán tickets y archivos asociados.
            </Dialog>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);

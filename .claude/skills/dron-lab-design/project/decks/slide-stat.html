<!-- @dsCard group="Slides" viewport="1280x720" name="Dato grande" subtitle="Estadística protagonista sobre fondo oscuro" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .slide{width:1280px;height:720px;background:var(--surface-inverse);color:var(--text-on-inverse);font-family:var(--font-body);padding:96px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .glow{position:absolute;bottom:-160px;left:-120px;width:520px;height:520px;background:radial-gradient(circle,rgba(34,211,238,.20),transparent 70%)}
  .grid{position:absolute;inset:0;background-image:var(--texture-grid);background-size:var(--texture-grid-size);opacity:.5;-webkit-mask-image:radial-gradient(circle at 30% 70%,#000,transparent 74%);mask-image:radial-gradient(circle at 30% 70%,#000,transparent 74%)}
  .eyebrow{font-family:var(--font-mono);font-size:15px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-yellow);margin-bottom:24px;position:relative}
  .big{font-family:var(--font-display);font-weight:700;font-size:200px;line-height:.9;letter-spacing:var(--ls-tight);background:var(--text-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;margin:0;position:relative}
  .cap{font-size:28px;color:var(--text-on-inverse);margin-top:24px;max-width:760px;position:relative;line-height:var(--lh-snug)}
  .cap b{color:var(--brand-yellow)}
</style></head>
<body>
<div class="slide">
  <div class="glow"></div>
  <div class="grid"></div>
  <div class="eyebrow">// El impacto</div>
  <p class="big">−40%</p>
  <p class="cap">de tiempo en tareas administrativas tras automatizar la <b>facturación y los reportes</b> de nuestros clientes.</p>
</div>
</body></html>

<!-- @dsCard group="Slides" viewport="1280x720" name="Portada" subtitle="Slide de título con wordmark" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  html,body{margin:0}
  .slide{width:1280px;height:720px;background:var(--surface-inverse);color:var(--text-on-inverse);font-family:var(--font-body);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 96px;box-sizing:border-box}
  .glow{position:absolute;top:-160px;right:-120px;width:560px;height:560px;background:radial-gradient(circle,rgba(255,107,53,.24),transparent 68%)}
  .glow2{position:absolute;bottom:-180px;left:-140px;width:520px;height:520px;background:radial-gradient(circle,rgba(34,211,238,.18),transparent 70%)}
  .grid{position:absolute;inset:0;background-image:var(--texture-grid);background-size:var(--texture-grid-size);opacity:.5;-webkit-mask-image:radial-gradient(circle at 70% 30%,#000,transparent 74%);mask-image:radial-gradient(circle at 70% 30%,#000,transparent 74%)}
  .mark{font-family:var(--font-mono);font-weight:700;font-size:22px;letter-spacing:0;position:absolute;top:56px;left:96px}
  .eyebrow{font-family:var(--font-mono);font-size:15px;letter-spacing:var(--ls-label);text-transform:uppercase;color:var(--brand-yellow);margin-bottom:28px;position:relative}
  h1{font-family:var(--font-display);font-weight:700;font-size:82px;line-height:var(--lh-tight);letter-spacing:var(--ls-tight);margin:0;position:relative}
  h1 em{font-style:normal;background:var(--text-gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:22px;color:var(--text-inverse-muted);margin-top:28px;max-width:720px;position:relative}
  .foot{position:absolute;bottom:56px;left:96px;right:96px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:14px;color:var(--text-faint)}
</style></head>
<body>
<div class="slide">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="mark"><span style="color:var(--brand-cyan);font-family:var(--font-mono)">~/</span><span style="font-family:var(--font-mono)">dronlab</span></div>
  <div class="eyebrow">// Propuesta de proyecto · El Dron en la Sopa</div>
  <h1>Software que <em>hace crecer</em><br>tu empresa</h1>
  <p class="sub">Aplicaciones web, páginas y automatizaciones a medida. Del prototipo a producción.</p>
  <div class="foot"><span>Propuesta para: Comercial Andina</span><span>Julio 2026</span></div>
</div>
</body></html>

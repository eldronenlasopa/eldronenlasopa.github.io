<!-- @dsCard group="Colors" viewport="700x180" name="Brand colors" subtitle="Naranja señal + amarillo + cian eléctrico (HUD)" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-card)}
  .row{display:flex;gap:0;padding:20px}
  .sw{flex:1;height:120px;border-radius:var(--radius-md);margin-right:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box}
  .sw:last-child{margin-right:0}
  .name{font-family:var(--font-mono);font-size:12px;font-weight:600}
  .hex{font-family:var(--font-mono);font-size:11px;opacity:.75}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--brand-orange);color:#0B0F1A"><span class="name">orange</span><span class="hex">#FF6B35</span></div>
  <div class="sw" style="background:var(--brand-orange-600);color:#fff"><span class="name">orange-600</span><span class="hex">#E85A28</span></div>
  <div class="sw" style="background:var(--brand-orange-300);color:#0B0F1A"><span class="name">orange-300</span><span class="hex">#FF9066</span></div>
  <div class="sw" style="background:var(--brand-yellow);color:#0B0F1A"><span class="name">yellow</span><span class="hex">#F7C948</span></div>
  <div class="sw" style="background:var(--brand-cyan);color:#0B0F1A"><span class="name">cyan</span><span class="hex">#22D3EE</span></div>
  <div class="sw" style="background:var(--brand-cyan-600);color:#fff"><span class="name">cyan-600</span><span class="hex">#0FB6D4</span></div>
</div>
</body></html>

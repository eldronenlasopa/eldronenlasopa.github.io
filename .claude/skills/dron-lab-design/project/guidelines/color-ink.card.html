<!-- @dsCard group="Colors" viewport="700x200" name="Ink / neutral scale" subtitle="Navy-tinted, de superficie profunda a texto claro" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-body);background:var(--surface-card)}
  .row{display:flex;gap:8px;padding:20px;flex-wrap:wrap}
  .sw{width:calc((100% - 88px)/12);min-width:44px;height:64px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle)}
  .lbls{display:flex;gap:8px;padding:0 20px 20px;flex-wrap:wrap}
  .l{width:calc((100% - 88px)/12);min-width:44px;font-family:var(--font-mono);font-size:9.5px;color:var(--text-muted);text-align:center}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--ink-950)"></div>
  <div class="sw" style="background:var(--ink-900)"></div>
  <div class="sw" style="background:var(--ink-800)"></div>
  <div class="sw" style="background:var(--ink-700)"></div>
  <div class="sw" style="background:var(--ink-600)"></div>
  <div class="sw" style="background:var(--ink-500)"></div>
  <div class="sw" style="background:var(--ink-400)"></div>
  <div class="sw" style="background:var(--ink-300)"></div>
  <div class="sw" style="background:var(--ink-200)"></div>
  <div class="sw" style="background:var(--ink-100)"></div>
  <div class="sw" style="background:var(--ink-50)"></div>
  <div class="sw" style="background:var(--white)"></div>
</div>
<div class="lbls">
  <div class="l">950</div><div class="l">900</div><div class="l">800</div><div class="l">700</div><div class="l">600</div><div class="l">500</div><div class="l">400</div><div class="l">300</div><div class="l">200</div><div class="l">100</div><div class="l">50</div><div class="l">white</div>
</div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x210" name="Radii & shadows" subtitle="Esquinas y elevaciones del sistema" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--surface-page);padding:24px 28px;display:flex;flex-direction:column;gap:24px}
  .row{display:flex;gap:20px;align-items:center}
  .box{width:84px;height:64px;background:var(--surface-card);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:var(--text-muted)}
</style></head>
<body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-sm)">sm 8</div>
  <div class="box" style="border-radius:var(--radius-md)">md 12</div>
  <div class="box" style="border-radius:var(--radius-lg)">lg 18</div>
  <div class="box" style="border-radius:var(--radius-xl)">xl 28</div>
  <div class="box" style="border-radius:var(--radius-pill)">pill</div>
</div>
<div class="row">
  <div class="box" style="border:none;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)">sm</div>
  <div class="box" style="border:none;border-radius:var(--radius-md);box-shadow:var(--shadow-md)">md</div>
  <div class="box" style="border:none;border-radius:var(--radius-md);box-shadow:var(--shadow-lg)">lg</div>
  <div class="box" style="border:none;border-radius:var(--radius-md);box-shadow:var(--shadow-brand)">brand glow</div>
</div>
</body></html>

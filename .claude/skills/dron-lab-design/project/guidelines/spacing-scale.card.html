<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="Base 4px — de space-1 a space-16" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-mono);background:var(--surface-card);padding:22px 28px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--brand-orange);border-radius:var(--radius-xs)}
  .lbl{font-size:10px;color:var(--text-muted)}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="bar" style="width:4px;height:4px"></div><span class="lbl">1·4</span></div>
  <div class="col"><div class="bar" style="width:8px;height:8px"></div><span class="lbl">2·8</span></div>
  <div class="col"><div class="bar" style="width:12px;height:12px"></div><span class="lbl">3·12</span></div>
  <div class="col"><div class="bar" style="width:16px;height:16px"></div><span class="lbl">4·16</span></div>
  <div class="col"><div class="bar" style="width:24px;height:24px"></div><span class="lbl">6·24</span></div>
  <div class="col"><div class="bar" style="width:32px;height:32px"></div><span class="lbl">8·32</span></div>
  <div class="col"><div class="bar" style="width:48px;height:48px"></div><span class="lbl">12·48</span></div>
  <div class="col"><div class="bar" style="width:64px;height:64px"></div><span class="lbl">16·64</span></div>
</div>
</body></html>

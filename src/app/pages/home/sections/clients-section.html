<section id="clientes" class="relative overflow-hidden border-t border-border-inverse bg-surface-inverse px-8 py-24">
  <div
    class="pointer-events-none absolute inset-0 bg-[image:var(--texture-grid)] bg-[length:var(--texture-grid-size)] opacity-35 [mask-image:radial-gradient(circle_at_20%_0%,#000,transparent_70%)]"
  ></div>
  <div
    class="pointer-events-none absolute -top-[120px] -right-[60px] h-[420px] w-[420px] bg-[radial-gradient(circle,rgba(34,211,238,0.16),transparent_66%)]"
  ></div>

  <div class="relative mx-auto max-w-[1200px]">
    <div class="mb-11 flex flex-wrap items-end justify-between gap-6">
      <div>
        <div class="mb-3.5 font-mono text-[13px] uppercase tracking-[0.14em] text-brand-cyan">// Confían en nosotros</div>
        <h2 class="m-0 max-w-[560px] font-display text-4xl font-bold leading-[1.15] tracking-[-0.03em] text-text-on-inverse">
          Empresas que crecieron con nosotros
        </h2>
      </div>
      <div class="flex flex-wrap gap-8">
        @for (stat of stats; track stat[1]) {
          <div>
            <div class="font-display text-[30px] font-bold text-brand-orange">{{ stat[0] }}</div>
            <div class="text-[13px] text-text-inverse-muted">{{ stat[1] }}</div>
          </div>
        }
      </div>
    </div>

    <div class="grid grid-cols-[repeat(auto-fill,minmax(250px,1fr))] gap-[18px]">
      @for (client of clients; track client.name) {
        <div
          class="relative flex min-h-[156px] flex-col justify-between overflow-hidden rounded-lg border border-[var(--glass-border)] bg-[var(--glass-dark)] px-[22px] py-6 backdrop-blur-[var(--blur-glass)] transition-[border-color,box-shadow,transform] duration-200 ease-out hover:-translate-y-1 hover:border-[var(--tile-color)] hover:shadow-[0_0_30px_-6px_var(--tile-color)]"
          [style.--tile-color]="client.color"
        >
          <div class="flex items-center justify-between">
            <span class="inline-flex items-center gap-3">
              <span class="text-2xl" [style.color]="client.color">{{ client.glyph }}</span>
              <span class="font-display text-[19px] font-semibold tracking-[-0.01em] text-text-on-inverse">{{
                client.name
              }}</span>
            </span>
          </div>
          <div>
            <div class="mb-2 font-mono text-[11px] uppercase tracking-[0.14em] text-text-inverse-muted">
              {{ client.sector }}
            </div>
            <div class="inline-flex items-center gap-2 font-mono text-[13.5px] font-medium" [style.color]="client.color">
              <span class="h-1.5 w-1.5 rounded-full" [style.background]="client.color"></span>
              {{ client.result }}
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>

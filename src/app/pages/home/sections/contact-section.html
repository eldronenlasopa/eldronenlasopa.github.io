<section id="contacto" class="bg-surface-inverse px-8 py-24">
  <div class="mx-auto grid max-w-[1200px] items-center gap-16 md:grid-cols-2">
    <div>
      <div class="mb-4 font-mono text-[13px] uppercase tracking-[0.14em] text-brand-yellow">// {{ content().eyebrow }}</div>
      <h2 class="m-0 mb-[18px] font-display text-[44px] font-bold leading-[1.15] tracking-[-0.03em] text-text-on-inverse">
        {{ content().title }}@if (content().highlight) { <span class="text-brand-orange"> {{ content().highlight }}</span> }
      </h2>
      <p class="m-0 mb-7 max-w-[440px] text-lg leading-[1.6] text-text-inverse-muted">
        {{ content().description }}
      </p>
      <ul class="m-0 flex list-none flex-col gap-3.5 p-0">
        @for (highlight of highlights(); track highlight) {
          <li class="flex items-center gap-3 text-[15.5px] text-text-on-inverse">
            <span class="font-bold text-brand-orange">✓</span>{{ highlight }}
          </li>
        }
      </ul>
      @if (content().image) {
        <img [src]="content().image" [alt]="content().title" class="mt-8 h-[190px] w-full max-w-[440px] rounded-lg border border-[var(--glass-border)] object-cover" />
      }
    </div>
    <app-contact-form class="justify-self-end" (submitted)="submit($event)" />
  </div>
</section>

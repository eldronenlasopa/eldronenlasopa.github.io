<section id="servicios" class="bg-surface-page px-8 py-24">
  <div class="mx-auto max-w-[1200px]">
    <div class="mb-3.5 font-mono text-[13px] uppercase tracking-[0.14em] text-brand-orange-600">// Qué hacemos</div>
    <h2 class="m-0 mb-12 max-w-[640px] font-display text-4xl font-bold leading-[1.15] tracking-[-0.03em] text-text-strong">
      Un socio tecnológico, no solo un proveedor
    </h2>
    <div class="grid grid-cols-[repeat(auto-fit,minmax(240px,1fr))] gap-6">
      @for (service of services; track service.title) {
        <app-card elevation="sm" [interactive]="true" [accent]="true">
          <div class="mb-4 text-2xl text-brand-orange">{{ service.icon }}</div>
          <h3 class="m-0 mb-2 font-display text-xl font-semibold text-text-strong">{{ service.title }}</h3>
          <p class="m-0 text-[15px] leading-[1.6] text-text-muted">{{ service.body }}</p>
        </app-card>
      }
    </div>
  </div>
</section>

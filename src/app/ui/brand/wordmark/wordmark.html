<span [class]="wrapperClasses()" [style.font-size]="fontSize()">
  @switch (variant()) {
    @case ('monogram') {
      <span
        aria-hidden="true"
        class="inline-flex h-[1.5em] w-[1.5em] items-center justify-center rounded-sm bg-[image:var(--gradient-hud)] text-[0.82em] text-ink-950 shadow-glow-soft-cyan"
        >⊹</span
      >
      <span>DRON<span class="text-brand-cyan">·</span>SOPA</span>
    }
    @case ('terminal') {
      <span class="text-brand-cyan">~/</span>
      <span>dronlab</span>
      <span
        aria-hidden="true"
        class="ml-[0.15em] inline-block h-[1.05em] w-[0.55em] rounded-[1px] bg-brand-orange [animation:dron-cursor_1s_steps(2,start)_infinite]"
      ></span>
    }
    @default {
      <span aria-hidden="true" class="font-mono text-[0.9em] font-semibold text-brand-orange">{{ '{' }}</span>
      el dron en la
      <span class="text-brand-orange">sopa</span>
      <span aria-hidden="true" class="font-mono text-[0.9em] font-semibold text-brand-orange">{{ '}' }}</span>
    }
  }
</span>

<span [class]="classes()" (click)="onClick()">
  <ng-content />
  @if (removable()) {
    <button
      type="button"
      aria-label="Quitar"
      (click)="onRemove($event)"
      class="border-0 bg-none p-0 text-inherit opacity-60 text-sm leading-none cursor-pointer"
    >
      ✕
    </button>
  }
</span>

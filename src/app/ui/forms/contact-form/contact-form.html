<form
  (ngSubmit)="onSubmit()"
  class="flex max-w-[480px] flex-col gap-5 rounded-lg border border-border-subtle bg-surface-card p-8 shadow-md"
>
  <div class="flex flex-col gap-1.5">
    <h3 class="m-0 font-display text-2xl font-bold tracking-[-0.01em] text-text-strong">{{ title() }}</h3>
    <p class="m-0 font-body text-[15px] leading-[1.35] text-text-muted">{{ subtitle() }}</p>
  </div>

  <app-input label="Nombre" placeholder="Tu nombre" [required]="true" [value]="name()" (valueChange)="name.set($event)" />
  <app-input
    label="Correo"
    type="email"
    placeholder="tucorreo@empresa.com"
    [required]="true"
    [value]="email()"
    (valueChange)="email.set($event)"
  />
  <app-select label="¿Qué necesitas?" [options]="services" [value]="service()" (valueChange)="service.set($event)" />
  <app-textarea
    label="Cuéntanos más"
    placeholder="Objetivo, alcance, plazos…"
    [rows]="3"
    [value]="message()"
    (valueChange)="message.set($event)"
  />

  <app-button type="submit" variant="primary" size="lg" [fullWidth]="true">Enviar mensaje</app-button>
  @if (captchaEnabled) {
    <p class="m-0 text-center text-[11px] leading-4 text-text-faint">
      Protegido por reCAPTCHA v3 · aplican la
      <a class="underline" href="https://policies.google.com/privacy" target="_blank" rel="noopener noreferrer">Política de Privacidad</a>
      y los
      <a class="underline" href="https://policies.google.com/terms" target="_blank" rel="noopener noreferrer">Términos</a>
      de Google.
    </p>
  }
</form>

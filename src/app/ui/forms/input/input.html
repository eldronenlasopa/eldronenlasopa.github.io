<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [for]="fieldId()" class="font-body text-sm font-semibold text-text-strong">
      {{ label() }}
      @if (required()) {
        <span class="text-danger"> *</span>
      }
    </label>
  }
  <div class="relative flex items-center">
    @if (hasIconLeft()) {
      <span class="absolute left-3.5 inline-flex text-text-faint">
        <ng-content select="[slot=icon-left]" />
      </span>
    }
    <input
      [id]="fieldId()"
      [type]="type()"
      [value]="value()"
      [placeholder]="placeholder() ?? ''"
      [disabled]="disabled()"
      [required]="required()"
      [class]="fieldClasses()"
      (input)="onInput($event)"
    />
  </div>
  @if (hint() || error()) {
    <span class="font-body text-[13px]" [class]="error() ? 'text-danger' : 'text-text-muted'">
      {{ error() || hint() }}
    </span>
  }
</div>

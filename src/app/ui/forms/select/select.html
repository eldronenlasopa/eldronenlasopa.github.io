<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [for]="fieldId()" class="font-body text-sm font-semibold text-text-strong">
      {{ label() }}
      @if (required()) {
        <span class="text-danger"> *</span>
      }
    </label>
  }
  <div class="relative">
    <select
      [id]="fieldId()"
      [value]="value()"
      [disabled]="disabled()"
      [required]="required()"
      [class]="fieldClasses()"
      (change)="onChange($event)"
    >
      @if (placeholder()) {
        <option value="" disabled>{{ placeholder() }}</option>
      }
      @for (opt of normalizedOptions(); track opt.value) {
        <option [value]="opt.value">{{ opt.label }}</option>
      }
    </select>
    <span class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-xs text-text-muted">▾</span>
  </div>
  @if (hint() || error()) {
    <span class="font-body text-[13px]" [class]="error() ? 'text-danger' : 'text-text-muted'">
      {{ error() || hint() }}
    </span>
  }
</div>

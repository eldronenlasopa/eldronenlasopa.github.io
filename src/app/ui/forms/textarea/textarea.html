<div class="flex flex-col gap-1.5">
  @if (label()) {
    <label [for]="fieldId()" class="font-body text-sm font-semibold text-text-strong">
      {{ label() }}
      @if (required()) {
        <span class="text-danger"> *</span>
      }
    </label>
  }
  <textarea
    [id]="fieldId()"
    [value]="value()"
    [placeholder]="placeholder() ?? ''"
    [rows]="rows()"
    [disabled]="disabled()"
    [required]="required()"
    [class]="fieldClasses()"
    (input)="onInput($event)"
  ></textarea>
  @if (hint() || error()) {
    <span class="font-body text-[13px]" [class]="error() ? 'text-danger' : 'text-text-muted'">
      {{ error() || hint() }}
    </span>
  }
</div>

<div [class]="cardClasses()">
  @if (badge() || featured()) {
    <span class="absolute top-5 right-5">
      <app-badge [tone]="featured() ? 'brand' : 'neutral'">{{ badge() || 'Recomendado' }}</app-badge>
    </span>
  }

  <div>
    <div
      class="font-mono text-xs uppercase tracking-[0.14em]"
      [class]="featured() ? 'text-brand-yellow' : 'text-text-muted'"
    >
      {{ name() }}
    </div>
    <div class="mt-2.5 flex items-baseline gap-1">
      <span
        class="font-display text-[46px] font-bold tracking-[-0.03em]"
        [class]="featured() ? 'text-white' : 'text-text-strong'"
        >{{ price() }}</span
      >
      <span class="text-[15px]" [class]="featured() ? 'text-text-inverse-muted' : 'text-text-muted'">{{
        period()
      }}</span>
    </div>
    @if (description()) {
      <p class="mt-2.5 text-sm leading-snug" [class]="featured() ? 'text-text-inverse-muted' : 'text-text-muted'">
        {{ description() }}
      </p>
    }
  </div>

  <ul class="m-0 flex list-none flex-col gap-3 p-0">
    @for (feature of features(); track feature) {
      <li class="flex items-start gap-2.5 text-[14.5px] leading-snug">
        <span class="shrink-0 font-bold text-brand-orange">✓</span>
        <span>{{ feature }}</span>
      </li>
    }
  </ul>

  <div class="mt-auto pt-2">
    <app-button [variant]="featured() ? 'primary' : 'outline'" [fullWidth]="true" (clicked)="ctaClicked.emit()">{{
      cta()
    }}</app-button>
  </div>
</div>

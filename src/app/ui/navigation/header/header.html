<header [class]="headerClasses()">
  <div class="flex items-center justify-between px-5 py-4 min-[821px]:px-8">
    <app-wordmark [tone]="inverse() ? 'light' : 'dark'" />
    <nav class="hidden items-center gap-7 min-[821px]:flex">
      @for (link of links(); track link.label) {
        <a [href]="link.href" [class]="linkClasses()">{{ link.label }}</a>
      }
    </nav>
    <div class="hidden min-[821px]:block">
      <app-button variant="primary" size="sm" (clicked)="ctaClicked.emit()">{{ cta() }}</app-button>
    </div>
    <button
      type="button"
      class="inline-flex h-11 w-11 flex-col items-center justify-center gap-[5px] border-0 bg-transparent p-0 min-[821px]:hidden"
      [attr.aria-label]="menuOpen() ? 'Cerrar menú' : 'Abrir menú'"
      [attr.aria-expanded]="menuOpen()"
      (click)="toggleMenu()"
    >
      <span [class]="barClasses()[0]"></span>
      <span [class]="barClasses()[1]"></span>
      <span [class]="barClasses()[2]"></span>
    </button>
  </div>
  @if (menuOpen()) {
    <nav [class]="mobileNavClasses()">
      @for (link of links(); track link.label) {
        <a [href]="link.href" [class]="mobileLinkClasses()" (click)="closeMenu()">{{ link.label }}</a>
      }
      <div class="mt-2">
        <app-button variant="primary" size="sm" [fullWidth]="true" (clicked)="onMobileCta()">{{ cta() }}</app-button>
      </div>
    </nav>
  }
</header>
